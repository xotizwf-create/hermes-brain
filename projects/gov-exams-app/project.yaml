id: gov-exams-app
name: Лёгкие экзамены / LiteExams
status: archived
summary: Архивный проект. Не включать в регулярные проектные дайджесты и не читать MCP/проектный контекст без прямой просьбы владельца.
tags: [web, education, subscriptions, tokens, node, react, postgres, archived]

github:
  repo: https://github.com/xotizwf-create/gov-exams-app
  default_branch: main

production:
  host_alias: prod-liteexams
  host: liteexams.ru
  working_dir: уточнить по secure-доступу перед серверными работами
  deploy: see deploy.md

mcp:
  name: gov_exams_tokens
  endpoint: stdio:gov_exams_tokens        # HTTP endpoint, if any, is not confirmed yet
  enabled_by_default: false
  owner_rule: читать только по прямой просьбе владельца

connectors: []

secret_refs:
  - proj/gov-exams-app/server/env
  - proj/gov-exams-app/ssh/root
  - proj/gov-exams-app/database/url
  - proj/gov-exams-app/tokens/admin

links:
  - overview.md
  - servers.md
  - deploy.md
  - runbook.md
  - decisions.md
  - incidents.md

automation_policy:
  include_in_regular_digests: false
  read_mcp_only_on_owner_request: true
