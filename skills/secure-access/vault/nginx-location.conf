# Hermes Vault — nginx location. Add INSIDE the TLS server block that serves your domain
# (e.g. server { listen 443 ssl; server_name www.andigital.ru; ... }).
# The base path must match config.json base_path. access_log off keeps the URL token out of logs.
location /andigital/secret/ {
    proxy_pass http://127.0.0.1:8787;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    access_log off;
    # only this app; small bodies
    client_max_body_size 1m;
}
