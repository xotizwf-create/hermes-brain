# Re-applies the MCP auto-reload gateway patch on every gateway start (because
# `hermes update` overwrites gateway/run.py). Idempotent; never blocks start.
#
# Install (on prod, as root):
#   mkdir -p /etc/systemd/system/hermes-gateway.service.d
#   cp skills/connect-mcp/systemd/20-mcp-autoreload.conf /etc/systemd/system/hermes-gateway.service.d/
#   systemctl daemon-reload
#   /usr/local/lib/hermes-agent/venv/bin/python \
#       /root/.hermes/agent-knowledge/skills/connect-mcp/patches/mcp_autoreload_patch.py
#   systemctl restart hermes-gateway
[Service]
ExecStartPre=/usr/local/lib/hermes-agent/venv/bin/python /root/.hermes/agent-knowledge/skills/connect-mcp/patches/mcp_autoreload_patch.py
