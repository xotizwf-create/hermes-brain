# Copy to /root/.hermes/secure/secrets.yaml on the server.
# Do not commit real secret values.

secrets:
  example_github_deploy_key:
    type: ssh_private_key
    value_path: /root/.ssh/example_project_ed25519
    scope: single repository deploy key
    rotate_after: 90d
  example_database_url:
    type: env
    value: postgresql://user:password@127.0.0.1:5432/dbname
    scope: single project database
    rotate_after: 180d
